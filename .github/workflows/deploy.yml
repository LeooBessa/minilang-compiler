name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissões necessárias para o deploy no GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Garante um deploy por vez, sem cancelar um em andamento
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build static web app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Flet CLI
        run: pip install "flet[cli]==0.85.1"

      - name: Publish static web app (Pyodide)
        run: |
          flet publish app.py \
            --base-url "${GITHUB_REPOSITORY#*/}" \
            --route-url-strategy hash \
            --distpath dist
          touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
